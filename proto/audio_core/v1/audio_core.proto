syntax = "proto3";

package audio_core.v1;

option go_package = "github.com/abend-arg/speakerfocus/services/orchestrator-go/internal/audiocorepb;audiocorepb";

service AudioCore {
  rpc DetectVoice(stream AudioChunk) returns (stream VadResponse);
  rpc Health(HealthRequest) returns (HealthResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string vad_backend = 2;
}

enum SampleFormat {
  SAMPLE_FORMAT_UNSPECIFIED = 0;
  SAMPLE_FORMAT_PCM_S16LE = 1;
}

message AudioChunk {
  uint64 sequence_number = 1;
  uint32 sample_rate_hz = 2;
  uint32 channels = 3;
  SampleFormat sample_format = 4;
  uint32 duration_ms = 5;
  bytes pcm = 6;
}

enum VadState {
  VAD_STATE_UNSPECIFIED = 0;
  VAD_STATE_SILENCE = 1;
  VAD_STATE_SPEECH = 2;
  VAD_STATE_MAYBE_SILENCE = 3;
}

message VadDecision {
  float speech_probability = 1;
  bool is_speech = 2;
  VadState state = 3;
}

message VadResponse {
  uint64 sequence_number = 1;
  VadDecision vad = 2;
}
